services:
  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file: ./helpdesk/.env
    environment:
      DATABASE_URL: "postgresql://it_helpdesk:CRC%40123%21%21%21@host.docker.internal:5432/helpdesk_db"
      ALLOWED_HOSTS: "itservicedesk.creditreferencenigeria.net,localhost"
      DEBUG: "False"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn helpdesk.wsgi --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 120"
